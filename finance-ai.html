        .btn-primary:hover { background: #059669; transform: translateY(-2px); }
        .btn-outline { border: 2px solid #10b981; color: #10b981; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.3s ease; background: transparent; cursor: pointer; }
